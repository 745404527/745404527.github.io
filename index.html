 //管理员获取观课数据
 function JsLo2Ex(LessonId,memo){
	ajax("ajax/LoadLessonData.php","LessonId="+LessonId,function(result){
													result=unescape(result.replace(/\\/g, "%"));
 													result=eval("("+result+")");
				 									ExcelStr="";
				 									ExcelStr="<tr><td colspan='6'>"+memo+"</td></tr>";
				 									ExcelStr+="<tr><td align='center'>年段</td><td align='center'>年级</td><td align='center'>班级</td><td align='center'>学号</td><td align='center'>姓名</td><td align='center'>观看时间</td></tr>";
				 									for(i in result){
				 										ExcelStr+="<tr>";
				 										ExcelStr+="<td>"+result[i].nd+"</td>";
				 										ExcelStr+="<td>"+result[i].nj+"</td>";
				 										ExcelStr+="<td>"+result[i].bj+"</td>";
				 										ExcelStr+="<td>"+result[i].xh+"</td>";
				 										ExcelStr+="<td>"+result[i].xm+"</td>";
				 										ExcelStr+="<td>"+result[i].OpenTime+"</td>";
				 										ExcelStr+="</tr>";
				 									}
				 									ExcelStr+="</table>";
				 									tableToExcel(ExcelStr);
												}
	);
}

 function tableToExcel(StrData){
	let worksheet = 'Sheet1';
	let uri = 'data:application/vnd.ms-excel;base64,';
	let template = `<html xmlns:o="urn:schemas-microsoft-com:office:office";
	xmlns:x="urn:schemas-microsoft-com:office:excel" 
	xmlns="http://www.w3.org/TR/REC-html40">
    <head><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
    <x:Name>${worksheet}</x:Name>
    <x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
    </x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
    </head><body><table>${StrData}</table></body></html>`;
	window.location.href = uri + base64(template);
 }

 function base64(s){
	return window.btoa(unescape(encodeURIComponent(s)));
 }

<script>

 function AjaxBegin(){
 	document.getElementById("Wait").style.display="";
	//document.FromLogin.LoginButton.disabled="disabled";
 }
 
 function AjaxEnd(){
 	document.getElementById("Wait").style.display="none";
	//document.FromLogin.LoginButton.disabled="";
 	return true;
 }
 
 function ajax(url,postStr,onsuccess){
 	var xmlhttp = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject('Microsoft.XMLHTTP');
	xmlhttp.open("POST", url, true);
	xmlhttp.onreadystatechange = function(){
		if(xmlhttp.readyState==4){
			if(xmlhttp.status==200){
				onsuccess(xmlhttp.responseText);
			}
			else{
				alert("服务器返回错误，请刷新页面后重试！");
				AjaxEnd();
			}
		}
	}
	xmlhttp.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
	xmlhttp.send(postStr);
 }

 function JsRemoveAllSpace(obj){
	obj.value=obj.value.replace(/\s+/g,"");
	return true;
 }
 
 function JsVerifyLogin(){
  LoginIDNumber=document.FromLogin.LoginIDNumber.value;
  LoginName=document.FromLogin.LoginName.value;
  if(LoginIDNumber=="" || LoginName==""){
  	document.getElementById("DivReturnAlert").innerHTML="<div class='alert alert-warning alert-dismissable'><button type='button' class='close' data-dismiss='alert' aria-hidden='true'>&times;</button>请填写登陆信息。</div>";
  	return false;
  }
  AjaxBegin();
  PostStr="LoginIDNumber="+LoginIDNumber+"&LoginName="+LoginName;
  ajax("ajax/StuLogin.php",PostStr,function(result){
										if(result=="LoginSucc"){
	 										document.getElementById("IdButton").innerHTML=LoginIDNumber;
	 										$("#myModal").modal("hide");
	 										ListLessons();
	 									}
	 									else{
	 										document.getElementById("DivReturnAlert").innerHTML="<div class='alert alert-danger alert-dismissable'><button type='button' class='close' data-dismiss='alert' aria-hidden='true'>&times;</button>身份验证失败，请重试。</div>";
	 									}
										AjaxEnd();	
	 									return true;
								}
  );
 }
 
 function OpenLesson(LessonId,LessonCaption,LessonCode){
 	document.getElementById("IdDivModalDialog").style.width="850px";
 	document.getElementById("myModalLabel").innerHTML=LessonCaption;
 	document.getElementById("ModalBody").style.height="500px";
 	document.getElementById("ModalBody").innerHTML="<iframe src='//player.bilibili.com/player.html?"+LessonCode+"' scrolling='no' border='0' frameborder='no' framespacing='0' allowfullscreen='true' width='100%' height='100%'> </iframe>";
 	document.getElementById("ModalCloseButton").style.display="";
 	$("#myModal").modal("show");
 	PostStr="LessonId="+LessonId;
 	ajax("ajax/OpenLessonClick.php",PostStr,function(result){});
 	return true;
 }
</script>
